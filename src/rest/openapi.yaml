openapi: 3.0.3
info:
  title: Swagger OpenThread REST API
  description: |-
    This describes the OpenThread Border Router REST API. The API is provided by the otbr-agent, if the cmake flag `OTBR_REST=ON` is set. By default
    the REST API listens on any address on port 8081.

    Some useful links:
    - [OpenThread Border Router repository](github.com/openthread/ot-br-posix/)

    ## Discovery through DNS-SD
    The REST API is discoverable via the following DNS-SD service:
    * Service Instance Name: `<serial-no>`
    * Service Type: `_thread._tcp`
      * Subtype for all TBRs: `_tbr._sub._thread._tcp`
      * Subtype for individual: `_<serial-no>._sub._thread._tcp`
    * Domain: `.local`

    DNS-SD returns the following information:
    * Hostname: FQDN of the TBR (e.g., `knx-<serial-no>.local` or `thread-<serial-no>.local`)
      * Used by IDevID and LDevID certificates as Subject Alternative Name `subjectAltName` for HTTPS
    * Address: IPv6 address of the TBR
    * Port: Port of the Web server (443 for HTTPS)

    ## Security Enrollment
    ### Authentication Methods
    TBR shall implement following authentication methods for all REST API endpoints:
    * Basic Authentication using HTTPS and the user `admin` and a password in ex-factory and operational state
    * Mutual Authentication using HTTPS with client certificate verification in ex-factory (if a client certificate is pre-configured) and operational state

    Clients must authenticate using at least one of the supported methods for each request. If a client attempts authentication using a method that is not configured, the TBR must reject the request with 401 Unauthorized.

    ### States
    The TBR operates in two states: `ex-factory` and `operational`.

    #### Ex-Factory State
    The TBR must be enrolled first before it can be used in operational state.
    During enrollment, the TBR must switch from ex-factory to operational state.
  
    * In ex-factory state, the TBR uses the IDevID manufacturer device certificate as HTTPS server certificate
    * The manufacturer may provide a manufacturer-specific access method to activate an Ephemeral REST API Credential Sharing Code for other clients to gain initial access to the TBR for REST API enrollment.
    * e.g. Clients may authenticate over Basic Authentication using the user `admin` and a password. The password may equal the Ephemeral REST API Credential Sharing Code or be printed on the device label humanly readable and/or included in the Data Matrix Code (DMC).

    #### Operational State
    Mutual authentication is required for any endpoint if not otherwise noted.
    * Using a LDevID certificate in operational state as HTTPS server certificate may require certificate renewal before expiration.
        * Clients may renew the LDevID device certificate by repeating enrollment steps as described below.
        * Clients must renew the LDevID before the LDevID expiration date
    * Clients must authenticate using one of the methods configured during enrollment:
        * Basic Authentication using the user `admin` and the password set during enrollment
            * Clients may change the password during operation using the corresponding *Security* endpoint `/api/auth/password`
        * Mutual authentication using HTTPS and with a client certificate stored under the *Security* endpoint `/api/auth/certs`
            * Clients may add additional client certificates or remove existing client certificates using the corresponding *Security* endpoint `/api/auth/certs`
            * Clients may retrieve certificate information using GET on `/api/auth/certs` with appropriate Accept header


    ### Enrollment Procedures
    The enrollment process comprises enrollment for server authentication (TBR identity) and enrollment for client authentication (how clients access the TBR).
    The LDevID certificate enrollment process shares concepts with EST (Enrollment over Secure Transport, [RFC 7030](https://tools.ietf.org/html/rfc7030)), but is kept deliberately simple for deployments without a full PKI infrastructure.

    #### Server Authentication (TBR Identity)
    The TBR presents a server certificate for HTTPS. Choose one of the following options:

    **Option 1: Keep IDevID (manufacturer certificate)**
    - No action required
    - TBR continues using the factory-installed IDevID certificate
    - Skip to Client Authentication section

    **Option 2: Self-signed LDevID**
    1. Generate an LDevID certificate by POSTing the `generateLDevIdTask` to `/api/actions`
    2. Retrieve the LDevID certificate from `/.well-known/thread/ldevid`
    3. Activate by POSTing to `/api/auth/enroll` with empty payload or `{"est_mode": "push"}`

    **Option 3: External CA - Manual Provisioning**
    1. Generate certificate offline with the full chain (including issuing CA and root CA); must include Subject Alternative Name matching hostname, e.g., `otbr-<serial-no>.local`
    2. PUT the certificate, private key, and chain to `/.well-known/thread/ldevid`
    3. Activate by POSTing to `/api/auth/enroll` with empty payload or `{"est_mode": "push"}`

    **Option 4: External CA - CSR Workflow**
    1. GET the Certificate Signing Request from `/.well-known/thread/csr`
    2. Generate the LDevID certificate signed by a CA; must include Subject Alternative Name matching hostname, e.g., `otbr-<serial-no>.local`
    3. PUT the certificate with full chain to `/.well-known/thread/ldevid`
    4. Activate by POSTing to `/api/auth/enroll` with empty payload or `{"est_mode": "push"}`

    **Option 5: EST Enrollment (Automatic)**
    1. POST to `/api/auth/enroll` with `{"est_server": "https://est.example.com"}`
    2. TBR automatically:
       - Fetches CA certificates from EST server
       - Generates CSR with hostname as Subject Alternative Name
       - Submits CSR using IDevID for authentication
       - Receives and activates LDevID certificate

    #### Client Authentication and Authorization
    Configure how clients authenticate to the TBR and what access they have. Multiple authentication methods can be enabled simultaneously.

    **Basic Authentication (Password)**
    1. Change the initial password by PUTting a new password to `/api/auth/password`
       - Client may request the TBR propose a password by POSTing empty body to `/api/auth/password`
    2. Clients authenticate using `Authorization: Basic` header with `admin` username

    **Mutual TLS Authentication (Client Certificates)**
    1. PUT client certificate with full chain (including issuing CA and root CA) to `/api/auth/certs`
       - Certificate chain must include all intermediate CAs up to the root CA
       - Repeat to add additional client certificates or update before expiration
       - Authentication is based on trust chain validation
       - First certificate auto-enrolls as admin with full access
    2. Clients authenticate by presenting their certificate during TLS handshake
       - TBR validates certificate chain against trusted CA bundle
       - Authentication based on trust chain validation only
       - Authorization (access control) based on Subject Alternative Names (SANs) and assigned roles

    **Authentication Mode Transition (Basic Auth → mTLS)**
    
    The TBR supports transitioning from Basic Authentication to Mutual TLS mode for production deployments:
    
    1. **Initial State**: In Ex-factory state, TBR starts in Basic Auth mode
       - Initial password MUST be changed immediately
       - All API endpoints accessible with HTTP Basic Authentication
       - Well-known endpoints (`.well-known/thread/*`) accessible without authentication
    
    2. **Bootstrap Phase**: Register first client certificate while in Basic Auth mode
       - PUT client certificate to `/api/auth/certs` using Basic Auth
       - First certificate automatically receives admin role with full access
       - Certificate stored in authorization database but Basic Auth remains active
       - Endpoint: `PUT /api/auth/certs` with `Content-Type: application/x-pem-file`
    
    3. **Trigger Transition**: Activate mTLS mode
       - POST to `/api/auth/enroll` (empty body) using Basic Auth
       - TBR switches reverse proxy configuration to require client certificates
    
    4. **Final State**: mTLS-only mode active
       - All endpoints (including `.well-known/thread/*`) require valid client certificates
       - Basic Authentication no longer accepted (TLS handshake fails without client cert)
       - Only enrolled certificates in `/api/auth/certs` database can authenticate
       - Unauthorized clients without any certificates receive SSL/TLS handshake error (not HTTP 401)
    
    5. **Operational Mode**: Managing additional clients
       - Use existing enrolled client certificate to authenticate
       - PUT additional client certificates to `/api/auth/certs` endpoint
       - Each certificate validated against CA bundle and assigned authorization scope
       - DELETE certificates via `DELETE /api/auth/certs/{id}` to revoke access
    
    **Implementation Notes**:
    - Configuration switch is idempotent (safe to trigger multiple times)
    - Reverse proxy (e.g., Traefik) handles TLS termination and certificate validation
    - Middleware validates Subject Alternative Names (SANs) and authorization roles/scopes
    - Backend receives X-Auth-Roles and X-Auth-Scopes headers for granular access control
    - Transition is one-way: reverting to Basic Auth requires manual configuration changes
    
    **Client Authorization Process**
    
    Authorization in mTLS mode uses a layered validation approach:
    
    1. **TLS Layer (Reverse Proxy)**:
       - Validates client certificate against CA bundle (trust chain)
       - Checks certificate expiration dates
       - Rejects connections with missing, expired, or untrusted certificates at TLS handshake
       - Extracts certificate information (Subject DN, Issuer DN, SANs) and passes to middleware
    
    2. **Authorization Layer (ForwardAuth Middleware)**:
       - Receives certificate information from reverse proxy via HTTP headers
       - Queries local authorization database file (certificate metadata storage)
       - Validates Subject Alternative Names (SANs) against stored certificate metadata
       - Extracts authorization role and scopes from database entry
       - Returns HTTP 403 Forbidden with JSON error if:
         - SANs do not match stored values
         - Issuer DN does not match stored issuer
       - Sets response headers for backend:
         - `X-Auth-Role`: Authorization role (currently only `admin` or `user`)
         - `X-Auth-Scopes`: Comma-separated scopes (e.g., `read,write` or `write`)
    
    3. **Application Layer (Backend REST API)**:
       - Receives validated requests with `X-Auth-Role` and `X-Auth-Scopes` headers
       - Enforces granular access control based on headers:
         - `admin` role: Full access to all endpoints including security material
         - `user` role (future): Access to operational endpoints only, no security material
         - Scopes control data visibility: `redacted` prevents sensitive data in responses
       - Returns HTTP 403 Forbidden if role/scope insufficient for requested operation
    
    **Authorization Database Structure**:
    ```json
    {
      "clients": {
        "<32-char-fingerprint>": {
          "subject": "CN=client1.example.com,O=Example Org",
          "issuer": "CN=Issuing CA,O=Example Org",
          "sans": ["client1.example.com", "192.168.1.100"],
          "role": "admin",
          "scope": ["read", "write"],
          "notBefore": "2026-01-01T00:00:00Z",
          "notAfter": "2027-01-01T00:00:00Z"
        }
      }
    }
    ```

