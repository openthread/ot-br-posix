  version: 0.3.0
servers:
  - url: http://localhost:8081
tags:
  - name: Well-Known
    description: RFC 8615 Well-Known URIs for API discovery and security enrollment.
  - name: Security
    description: Security and enrollment endpoints.
  - name: Actions
    description: Task queue.
  - name: node
    description: Thread parameters of this node.
  - name: Devices
    description: Collection of discovered Thread devices.
  - name: Diagnostics
    description: Collection of Thread network diagnostic responses.
paths:

  ### Well-Known ##############################################################
  #############################################################################

  /.well-known/thread:
    get:
      operationId: getWellKnownThread
      summary: Read API version and entry points
      description: |
        Information about the supported API version (see gray tag at the top of this specification), API location (base path), and links to its entry points.

        ## Static
        API version, location, and entry points are known at compile time.

        ## Link Attributes (`/.well-known/thread`)
        `rel="self" type="application/json"`
      tags:
        - Well-Known
      responses:
        "200":
          $ref: "#/components/responses/WellKnownThread200"

  /.well-known/thread/idevid:
    get:
      operationId: getIDevID
      summary: Read factory-assigned IDevID certificate
      description: |
        Manufacturer device certificate (X.509) following IEEE 802.1AR.

        This certificate is used for the HTTPS server in ex-factory state.

        Devices without imprinted IDevID certificate may return 500 Internal Server Error.

        ## Link Attributes (`/.well-known/thread`)
        `rel="idevid" type="application/pkcs7-mime; smime-type=certs-only"`
      tags:
        - Well-Known
      responses:
        "200":
          $ref: "#/components/responses/ManufacturerCertificate200"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /.well-known/thread/ldevid:
    get:
      operationId: getLDevID
      summary: Read generated LDevID certificate used for operation
      description: |
        This certificate is used for the HTTPS server when enrolled with the upstream system.

        Self-signed operational certificate (X.509) when generated by the TBR using the `generateLDevIdTask`.

        ## Condition
        Requires the most recent `generateLDevIdTask` to be `completed` to provide the LDevID certificate; or
        requires an operational LDevID certificate to be previously assigned using the PUT method;
        otherwise returns 404 Not Found.

        ## Link Attributes (`/.well-known/thread`)
        `rel="ldevid" type="application/pkcs7-mime; smime-type=certs-only"`
      tags:
        - Well-Known
      responses:
        "200":
          $ref: "#/components/responses/OperationalCertificate200"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      operationId: putLDevID
      summary: Write certificate and private key for use in operational state
      description: |
        Write an offline generated signed operational certificate (X.509) and its private key.

        This certificate is used for the HTTPS server when enrolled with the upstream system.

        ## Condition
        Requires ex-factory state or previous enrollment using the same method (no use of `generateLDevIdTask`);
        otherwise returns 409 Conflict.

        ## Link Attributes (`/.well-known/thread`)
        `rel="ldevid" type="application/x-pem-file"`
        `rel="ldevid" type="application/x-pkcs12"`

      tags:
        - Well-Known
      security:
        - basicAuth: []
        - mutualCertAuth: []
      requestBody:
        $ref: "#/components/requestBodies/LDevIDPutReq"
      responses:
        "204":
          description: Indicates successful change of LDevID and private key.
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /.well-known/thread/csr:
    get:
      operationId: getCSR
      summary: Read Certificate Signing Request for LDevID generation
      description: |
        Certificate Signing Request (CSR) in PKCS#10 format for the TBR's LDevID certificate.
        
        The CSR includes:
        - A public key generated by the TBR
        - Subject information with the TBR's hostname
        - Subject Alternative Name (SAN) matching the TBR's hostname (e.g., `otbr-<serial-no>.local`)
        
        This endpoint enables external CA-signed certificate enrollment as described in Variant C.
        The client retrieves the CSR, has it signed by a CA, and then PUTs the resulting certificate back to `/.well-known/thread/ldevid`.

        ## Link Attributes (`/.well-known/thread`)
        `rel="csr" type="application/pkcs10"`
      tags:
        - Well-Known
      security:
        - basicAuth: []
        - mutualCertAuth: []
      responses:
        "200":
          $ref: "#/components/responses/CSR200"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  ### Security ################################################################
  #############################################################################

  /api/auth/password:
    post:
      operationId: getProposedPassword
      summary: Generate password
      description: |
        Trigger to generate a password proposal for client authentication that fulfills the password policy.

        The device generates a UTF-8 string without any UTF-8 control characters of 16 to 24 bytes in length.
        It is not applied and the client may set it using a PUT request with a copy of the body to confirm the proposal.

        ## Link Attributes (`/.well-known/thread`)
        `rel="password" type="text/plain; charset=UTF-8"`
      tags:
        - Security
      security:
        - basicAuth: []
        - mutualCertAuth: []
      responses:
        "200":
          $ref: "#/components/responses/Password200"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      operationId: setPassword
      summary: Change password
      description: |
        Input to set a new UTF-8 based REST API password for client authentication. The string is also applied as Thread *Commissioning Credential*.

        ## Condition
        - minimum 12 characters
        - maximum 255 bytes (UTF-8 characters may consist of multiple bytes)
        - no control characters (e.g., not lower than `\x20`)
        - three out of four must be met:
          - at least one uppercase alphabetic character
          - at least one lowercase alphabetic character
          - at least one digit
          - at least one non-alphanumeric character

        ## On Success
        - changes the password for the user `admin` used for *Basic Auth*
        - returns 204 No Content

        ## On Failure
        Returns one of the following:
          - 415 Unsupported Media Type, when the request content type is not `text/plain; charset=UTF-8`, `application/json`, nor empty (tolerant server)
          - 422 Unprocessable Content, when the request body does not respect the password format or policies
          - 500 Internal Server Error, if the server fails to change the password

      tags:
        - Security
      security:
        - basicAuth: []
        - mutualCertAuth: []
      requestBody:
        $ref: "#/components/requestBodies/PasswordReq"
      responses:
        "204":
          description: Indicates successful password change.
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "415":
          $ref: "#/components/responses/UnsupportedMediaTypeError"
        "422":
          $ref: "#/components/responses/UnprocessableError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      operationId: deletePassword
      summary: Remove password
      description: |
        Remove the password for the user `admin`, thereby disabling Basic Authentication. Note that the *Commissioning Credential* remains unchanged.

        ## Condition
        Requires at least one other authentication method (mutual certificate authentication) to be configured;
        otherwise returns 409 Conflict.

        ## On Success
        - removes the password for the user `admin`
        - disables Basic Authentication
        - returns 204 No Content

        ## On Failure
        Returns one of the following:
          - 409 Conflict, if no other authentication method is configured
          - 500 Internal Server Error, if the server fails to remove the password
      tags:
        - Security
      security:
        - basicAuth: []
        - mutualCertAuth: []
      responses:
        "204":
          description: Indicates successful password removal.
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/enroll:
    post:
      operationId: invokeEnrollment
      summary: Enrollment trigger
      description: |
        Trigger enrollment with upstream system by switching to the operational certificate (or its renewal).

        ## Modes

        ### Push Mode (preloaded LDevID)
        Switch to a preloaded LDevID certificate that was previously uploaded via `/.well-known/thread/ldevid`.

        #### Request Body
        ```json
        {
          "est_mode": "push"
        }
        ```
        Or empty POST treated as push mode.

        #### Condition
        Requires the operational LDevID certificate generated and the initial password changed;
        otherwise returns 409 Conflict.

        #### Background Logic
        - closes the TLS session of potential keep-alive connections
        - changes the HTTPS server certificate to the latest LDevID certificate provided in the *Well-Known* endpoint `/.well-known/thread/ldevid`
        - may reboot the Web server or devices to apply changes

        ### Pull Mode (EST enrollment)
        Automatically enroll with an EST (Enrollment over Secure Transport, RFC 7030) server to obtain an LDevID certificate.

        #### Request Body
        ```json
        {
          "est_server": "https://est.example.com"
        }
        ```

        #### Background Logic
        The TBR performs the following operations automatically:
        1. Validates the EST server URL (HTTPS required)
        2. Fetches CA certificates from `{est_server}/.well-known/est/cacerts` using IDevID for mTLS authentication
        3. Updates the local CA trust bundle with received CA certificates
        4. Generates a Certificate Signing Request (CSR) for LDevID with Subject Alternative Name matching the TBR's hostname (e.g., `hostname.local`)
        5. Submits the CSR to `{est_server}/.well-known/est/simpleenroll` using IDevID for mTLS authentication
        6. Receives and stores the issued LDevID certificate
        7. Switches the active HTTPS server certificate to the new LDevID certificate
        8. Reloads the TLS configuration without service interruption

        #### Conditions
        - Requires IDevID certificate and private key to be available for EST server authentication
        - EST server must be accessible via HTTPS
        - EST server must support RFC 7030 endpoints: `/cacerts` and `/simpleenroll`

        ## Link Attributes (`/.well-known/thread`)
        `rel="enroll" type="application/json"`
      tags:
        - Security
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              oneOf:
                - required:
                    - est_mode
                  properties:
                    est_mode:
                      type: string
                      enum:
                        - push
                      description: Push mode - use preloaded LDevID certificate
                      example: push
                - required:
                    - est_server
                  properties:
                    est_server:
                      type: string
                      format: uri
                      description: Pull mode - HTTPS URL of the EST server to fetch LDevID from
                      example: https://est.example.com
      security:
        - basicAuth: []
        - mutualCertAuth: []
      responses:
        "204":
          description: Indicates successful enrollment trigger or EST enrollment completion.
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/certs:
    get:
      operationId: getClientCerts
      summary: Retrieve stored client certificates
      description: |
        Retrieve all client certificates currently stored by the TBR for mutual authentication.

        Supports content negotiation via the Accept header:
        - `application/json` - Returns a JSON array of certificate metadata (ID, subject, issuer, expiration)
        - `application/pkcs7-mime` - Returns PKCS#7 certificate bundle (EST-compatible)

        The default (no Accept header) returns PKCS#7 format for EST compatibility.
        Certificate IDs are the first 32 characters of the SHA-256 fingerprint.

        ## Link Attributes (`/.well-known/thread`)
        `rel="certs" type="application/json"`
        `rel="certs" type="application/pkcs7-mime; smime-type=certs-only"`
      tags:
        - Security
      security:
        - basicAuth: []
        - mutualCertAuth: []
      parameters:
        - name: Accept
          in: header
          description: Requested response format
          schema:
            type: string
            enum:
              - application/json
              - application/pkcs7-mime
      responses:
        "200":
          $ref: "#/components/responses/ClientCertificates200"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      operationId: putClientCert
      summary: Store a client certificate (server-generated ID)
      description: |
        Store a client certificate where the server generates the ID from the 
        certificate's SHA-256 fingerprint (first 32 characters, lowercase hex).
        This is the recommended enrollment method as it ensures ID consistency.
        
        ## Enrollment Behavior
        - **First certificate**: Automatically enrolled as admin with full access scope
        - **Subsequent certificates**: Enrolled with scope determined by the authenticating client
        
        **Role/Scope Configuration** (optional future extensions, not yet implemented):
        - Certificate-embedded: Extract role/scope from X.509 extensions, Subject Alternative Names, or Subject DN fields
        - Authorization endpoint: Use `PATCH /api/auth/certs/{id}` to update role/scope after enrollment
        
        ## Certificate Format
        The client certificate must:
        - Be in PEM format (application/x-pem-file)
        - Include the full certificate chain (client cert + intermediate CA(s) + root CA)
        - **NOT include the private key** (private key remains with the client)
        - Be signed by any trusted CA
          - Exception: If the first client certificate is enrolled after transitioning to mTLS mode, it must be validated against the TBR's CA bundle.
          - Subsequent certificates can be signed by any CA (validation by Traefik/TLS layer)
        
        ## Server Processing
        1. Extracts certificate from PEM format
        2. Calculates SHA-256 fingerprint (first 32 chars as ID)
        3. Validates certificate chain and expiration
        4. Extracts Subject DN, Issuer DN, and Subject Alternative Names (SANs)
        5. Stores certificate metadata in authorization database with generated ID
        6. Returns the generated certificate ID in response
        
        ## Condition
        The client certificate must be valid and parseable;
        otherwise returns 422 Unprocessable Content.
        
        ## On Success
        Returns 201 Created with the generated certificate ID in the response body.
      tags:
        - Security
      security:
        - basicAuth: []
        - mutualCertAuth: []
      requestBody:
        $ref: "#/components/requestBodies/ClientCertPutReq"
      responses:
        "201":
          description: Certificate stored successfully with server-generated ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    pattern: '^[a-f0-9]{32}$'
                    description: Server-generated certificate ID (first 32 chars of SHA-256 fingerprint)
                  message:
                    type: string
                    description: Success message
                example:
                  id: "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6"
                  message: "Client certificate enrolled successfully"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "422":
          $ref: "#/components/responses/UnprocessableError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/certs/{id}:
    get:
      operationId: getClientCert
      summary: Retrieve a specific client certificate
      description: |
        Retrieve a single client certificate by its ID (first 32 chars of SHA-256 fingerprint).
        Returns the certificate in PEM format.
      tags:
        - Security
      security:
        - basicAuth: []
        - mutualCertAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Certificate ID (first 32 characters of SHA-256 fingerprint)
          schema:
            type: string
            pattern: '^[a-f0-9]{32}$'
      responses:
        "200":
          description: Certificate in PEM format
          content:
            application/x-pem-file:
              schema:
                type: string
        "401":
