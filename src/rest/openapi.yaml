        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      operationId: putClientCertById
      summary: Store or update a client certificate
      description: |
        Store a client certificate with a specific ID.
        The certificate's SHA-256 fingerprint must match the provided ID.
        Additional certificates may be added by repeating this operation.

        ## Condition
        The client certificate must be valid and parseable;
        otherwise returns 422 Unprocessable Content.
        The certificate's fingerprint must match the provided ID;
        otherwise returns 400 Bad Request.
      tags:
        - Security
      security:
        - basicAuth: []
        - mutualCertAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Certificate ID (first 32 characters of SHA-256 fingerprint)
          schema:
            type: string
            pattern: '^[a-f0-9]{32}$'
      requestBody:
        description: Certificate chain in PEM format
        required: true
        content:
          application/x-pem-file; charset=ASCII:
            schema:
              $ref: "#/components/schemas/ClientCert"
      responses:
        "204":
          description: Indicates successful storage of client certificate.
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "422":
          $ref: "#/components/responses/UnprocessableError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      operationId: deleteClientCertById
      summary: Remove a specific client certificate
      description: |
        Remove a client certificate by its ID (first 32 chars of SHA-256 fingerprint).

        ## Condition
        Requires the certificate to exist;
        otherwise returns 404 Not Found.
      tags:
        - Security
      security:
        - basicAuth: []
        - mutualCertAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Certificate ID (first 32 characters of SHA-256 fingerprint)
          schema:
            type: string
            pattern: '^[a-f0-9]{32}$'
      responses:
        "204":
          description: Indicates successful removal of client certificate.
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

